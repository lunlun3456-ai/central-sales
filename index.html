  document.getElementById('att-cancel-btn').onclick=function(){document.getElementById('att-confirm-modal').remove();};
  document.getElementById('att-confirm-btn').onclick=function(){document.getElementById('att-confirm-modal').remove();submitAttendance(type);};
}
async function submitAttendance(type){
  if(currentUser.store==='HQ'||currentUser.store==='hq'){
    showToast(lang==='zh'?'总部员工无需打卡':'HQ staff do not require attendance','error');return;
  }
  var remark=(document.getElementById('att-remark')||{value:''}).value||'';
  var ZH=lang==='zh';
  var label=type==='check_in'?(ZH?'签到':'Check In'):(ZH?'签退':'Check Out');
  var td=dateKeyUTC8();
  // Merge server + session records for today
  var mine=getAllAttendance().filter(function(r){
    return r.dateKey===td&&r.username===currentUser.username&&r.status!=='rejected'&&r.status!=='voided';
  });
  var todayCheckIn =mine.find(function(r){return r.type==='check_in';});
  var todayCheckOut=mine.find(function(r){return r.type==='check_out';});

  if(type==='check_in'){
    if(todayCheckIn){
      // Already checked in today — never block, but warn
      showToast((ZH?'今日已于 ':'Already checked in at ')+fmtTimeUTC8(todayCheckIn.datetime)
        +(ZH?' 签到，如需重新签到请联系管理员':'  — contact supervisor to edit if needed'),'error');
      return;
    }
    // ── OPTION 3: Check if previous day has unclosed check-in (no checkout) ──
    // If so, auto-flag it as "no checkout" and allow today's check-in
    var yest=new Date(); yest.setDate(yest.getDate()-1);
    var yestKey=yest.toLocaleDateString('en-CA',{timeZone:'Asia/Kuala_Lumpur'});
    var prevAll=getAllAttendance().filter(function(r){
      return r.username===currentUser.username&&r.status!=='rejected'&&r.status!=='voided';
    });
    // Check last 3 days for any unclosed check-in (no corresponding checkout)
    for(var d=1;d<=3;d++){
      var checkD=new Date(); checkD.setDate(checkD.getDate()-d);
      var checkDK=checkD.toLocaleDateString('en-CA',{timeZone:'Asia/Kuala_Lumpur'});
      var dayIn =prevAll.find(function(r){return r.dateKey===checkDK&&r.type==='check_in';});
      var dayOut=prevAll.find(function(r){return r.dateKey===checkDK&&r.type==='check_out';});
      if(dayIn&&!dayOut){
        // Flag this unclosed session for supervisor to fix
        showToast((ZH?'⚠️ '+checkDK+' 未签退 — 已记录，请联系主管修正'
                     :'⚠️ '+checkDK+' — missing checkout. Flagged. Supervisor to edit.'),'pending');
        // Auto-create a "missed checkout" marker in session so it shows in records
        var missedRecord={
          id:'missed_'+checkDK+'_'+currentUser.username,
          username:currentUser.username,name:currentUser.name,role:currentUser.role,
          store:currentUser.store,type:'check_out',status:'missed_checkout',
          dateKey:checkDK,datetime:checkDK+'T23:59:00+08:00',
          lat:'',lng:'',source:'auto',remark:ZH?'未签退（系统标记）':'Missed checkout (auto-flagged)',
          createdAt:nowUTC8()
        };
        // Save to session so it shows in UI
        if(!_attSession.find(function(r){return r.id===missedRecord.id;})){
          _attSession.push(missedRecord);
        }
        break;
      }
    }
    // Allow check-in to proceed — never block due to missing previous checkout
  }

  if(type==='check_out'){
    if(!todayCheckIn){showToast(ZH?'请先签到':'Check in first','error');return;}
    if(todayCheckOut){showToast((ZH?'今日已于 ':'Already checked out at ')+fmtTimeUTC8(todayCheckOut.datetime),'error');return;}
  }
  showToast(ZH?'正在获取位置...':'Getting location...','pending');
  try{
    var loc=await getBestLocation();
    var record={
      id:String(Date.now()),username:currentUser.username,pin:currentUser.pin,
      name:currentUser.name,role:currentUser.role,store:currentUser.store,
      type:type,status:'pending',dateKey:dateKeyUTC8(),datetime:nowUTC8(),
      lat:loc.lat,lng:loc.lng,accuracy:loc.accuracy,source:loc.source,
      remark:remark,accuracy:loc.accuracy,gpsSource:loc.source,deviceId:getDeviceId(),deviceName:getDeviceName(),
      userAgent:navigator.userAgent||'',platform:navigator.platform||''
    };
    fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',cache:'no-cache',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(Object.assign({action:'submitAttendance'},record))
    }).catch(function(e){console.warn('sync fail',e);});
    var zone=nearestLocalZone(record.store,record.lat,record.lng);
    // iOS GPS can have 100-500m error — add accuracy as buffer to allowed radius
    var gpsBuffer=Math.max(0,(loc.accuracy||0)-20);
    var zoneRejected=zone&&zone.distanceMeters>(zone.radiusMeters+gpsBuffer);
    if(zoneRejected){
      record.status='rejected';
      var EN3=lang==='en';
      var accNote3=loc.accuracy>50?' (GPS ±'+loc.accuracy+'m)':'';
      showAttendanceResult('rejected',EN3?label+' Rejected':label+' Ditolak',
        (EN3?'Outside allowed zone. ':'Di luar zon yang dibenarkan. ')
        +zone.distanceMeters+'m '+(EN3?'away (max ':'jauh (max ')+zone.radiusMeters+'m)'+accNote3+'. '
        +(EN3?'Try moving to open area and check in again.':'Cuba pindah ke kawasan terbuka dan daftar semula.'),'');
    } else {
      var bound=_getDeviceBound(record.deviceId);
      if(bound&&bound!==currentUser.username.toLowerCase()){
        record.status='rejected';
        _attSession.push(record);
        renderAttendanceTab();setTimeout(function(){triggerSyncRefresh();},1500);
        showAttendanceResult('rejected',label+' Blocked',
          ZH?'此设备已绑定用户 '+bound+'。请使用您自己的设备，如需重置请联系管理员。'
            :'Device registered to '+bound+'. Use your own device. Contact Admin to reset.',
          record.deviceName);
        return;
      }
      _bindDevice(record.deviceId,currentUser.username);
      record.status='present';
      showAttendanceResult('success',label+' Saved',
        (ZH?'考勤已记录：':'Attendance recorded for ')+currentUser.name+'.',record.deviceName,type);
    }
    // Save to session memory FIRST (survives sync overwrites)
    _attSession.push(record);
    renderAttendanceTab();
    setTimeout(function(){triggerSyncRefresh();},1500);
  }catch(e){
    // Location failed — still save the record
    var errRecord={
      id:String(Date.now()),username:currentUser.username,pin:currentUser.pin,
      name:currentUser.name,role:currentUser.role,store:currentUser.store,
      type:type,status:'present',dateKey:dateKeyUTC8(),datetime:nowUTC8(),
      lat:0,lng:0,accuracy:9999,source:'location_error',
      remark:remark,accuracy:loc.accuracy,gpsSource:loc.source,deviceId:getDeviceId(),deviceName:getDeviceName(),
      userAgent:navigator.userAgent||'',platform:navigator.platform||''
    };
    fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',cache:'no-cache',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(Object.assign({action:'submitAttendance'},errRecord))
    }).catch(function(){});
    _attSession.push(errRecord);

    showAttendanceResult('success',label+' Saved',
      (ZH?'考勤已记录（位置不可用）':'Attendance saved (location unavailable)'),getDeviceName());
    renderAttendanceTab();
    setTimeout(function(){triggerSyncRefresh();},1500);
  }
}

function getBestLocation(){
  return new Promise(function(resolve){
    if(!navigator.geolocation){_ipLoc(resolve);return;}
    var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent||'');
    // iOS needs high accuracy enabled for GPS (not WiFi triangulation)
    var opts1={enableHighAccuracy:true, timeout:isIOS?25000:15000, maximumAge:0};
    var opts2={enableHighAccuracy:false,timeout:8000, maximumAge:60000};
    var done=false;
    // Try high-accuracy GPS first
    navigator.geolocation.getCurrentPosition(
      function(p){
        if(done) return; done=true;
        resolve({lat:p.coords.latitude,lng:p.coords.longitude,
          accuracy:Math.round(p.coords.accuracy||0),source:'gps'});
      },
      function(){
        if(done) return; done=true;
        // Fallback to network location
        navigator.geolocation.getCurrentPosition(
          function(p){resolve({lat:p.coords.latitude,lng:p.coords.longitude,
            accuracy:Math.round(p.coords.accuracy||0),source:'network'});},
          function(){_ipLoc(resolve);},
          opts2);
      },
      opts1);
  });
}
function _ipLoc(resolve){
  fetch('https://ipapi.co/json/',{cache:'no-cache'}).then(function(r){return r.json();})
    .then(function(d){if(d.latitude&&d.longitude)resolve({lat:parseFloat(d.latitude),lng:parseFloat(d.longitude),accuracy:5000,source:'ip'});else throw 0;})
    .catch(function(){fetch('https://ipinfo.io/json',{cache:'no-cache'}).then(function(r){return r.json();})
      .then(function(d){if(d.loc){var p=d.loc.split(',');resolve({lat:parseFloat(p[0]),lng:parseFloat(p[1]),accuracy:5000,source:'ip2'});}else throw 0;})
      .catch(function(){resolve({lat:0,lng:0,accuracy:9999,source:'unavailable'});});});
}
function nearestLocalZone(store,lat,lng){ const zones=(cachedWorkZones.length?cachedWorkZones:loadData('work_zones',[])).filter(z=>z.store===store&&String(z.status||'active')==='active'); if(!zones.length) return null; return zones.map(z=>({radiusMeters:parseFloat(z.radiusMeters)||500,distanceMeters:distanceMeters(lat,lng,parseFloat(z.latitude),parseFloat(z.longitude))})).sort((a,b)=>a.distanceMeters-b.distanceMeters)[0]; }
function distanceMeters(lat1,lon1,lat2,lon2){ const R=6371000,toRad=n=>n*Math.PI/180,dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2; return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))); }

async function bulkDecideApprovals(decision){
  var ids=Array.from(document.querySelectorAll('.appr-cb:checked')).map(function(cb){return cb.dataset.id;});
  if(!ids.length){showToast(lang==='zh'?'请先选择记录':'Select records first','error');return;}
  var ZH=lang==='zh';
  var word=decision==='approve'?(ZH?'批准':'approve'):(ZH?'拒绝':'reject');
  if(!confirm(ZH?'确定要'+word+' '+ids.length+' 条记录？':'Confirm '+word+' '+ids.length+' item(s)?')) return;
  showToast(ZH?'处理中...':'Processing...','pending');
  var all=getApprovals();
  for(var i=0;i<ids.length;i++){
    var id=ids[i];
    try{
      await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',cache:'no-cache',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:decision==='approve'?'approveApprovalRequest':'rejectApprovalRequest',
          id:id,approver:currentUser.name,approverRole:currentUser.role,approverStore:currentUser.store})});
      all=all.map(function(r){return r.id===id?Object.assign({},r,{status:decision==='approve'?'approved':'rejected'}):r;});
    }catch(e){console.warn('bulk err',id,e);}
  }
  saveApprovals(all);
  showToast((ZH?(decision==='approve'?'已批准 ':'已拒绝 '):(decision==='approve'?'Approved ':'Rejected '))+ids.length+(ZH?' 条':''),'success');
  renderAdminTab();
  setTimeout(function(){triggerSyncRefresh();},1500);
}

var _adminRenderSeq=0;
async function fetchAttendanceForAdmin(){
  // Independent attendance fetch — used by renderAdminTab and manual sync button
  try{
    var r=await gasGet('getAttendance');
    var attArr=(r&&Array.isArray(r.attendance))?r.attendance:(Array.isArray(r)?r:null);
    if(attArr===null){
      var r2=await gasGet('getAppData');
      if(r2&&Array.isArray(r2.attendance)) attArr=r2.attendance;
    }
    if(attArr!==null){
      _serverAtt=attArr;
      _serverAttLoaded=true;
      saveData('attendance_records',[]);
      return true;
    }
  }catch(e){ console.warn('attendance fetch failed:',e.message); }
  return false;
}
async function fetchApprovalsForAdmin(){
  // Pulls pending Sales/Settlement approval requests from the server.
  // Without this, the Admin tab only shows whatever was last cached
  // locally (e.g. from a previous visit to Records tab) — meaning a
  // fresh staff request would never appear until something else happened
  // to trigger a sync. Admin tab must always pull this fresh.
  try{
    var r=await gasGet('getAppData');
    if(r&&Array.isArray(r.approvals)){
      saveApprovals(r.approvals);
      return true;
    }
  }catch(e){ console.warn('approvals fetch failed:',e.message); }
  return false;
}

  document.getElementById('user-edit-title').textContent='✏️ '+t('editUser');
  document.getElementById('edit-user-key').value=username;
  document.getElementById('edit-username').value=username; document.getElementById('edit-username').disabled=true;
  document.getElementById('edit-name').value=u.name||''; document.getElementById('edit-phone').value=u.phone||'';
  document.getElementById('edit-pin').value=u.pin||''; document.getElementById('edit-role').value=u.role||'staff';
  document.getElementById('edit-store').value=u.store||'HQ';
  document.getElementById('user-edit-modal').classList.add('open');
}
function closeUserEditModal(){document.getElementById('user-edit-modal').classList.remove('open');}
async function saveUserEdit() {
  const originalKey=document.getElementById('edit-user-key').value;
  const username=document.getElementById('edit-username').value.trim().toLowerCase();
  const name=document.getElementById('edit-name').value.trim();
  const phone=document.getElementById('edit-phone').value.trim();
  const pin=document.getElementById('edit-pin').value.trim();
  const role=document.getElementById('edit-role').value;
  const store=document.getElementById('edit-store').value;
  if(!username||!name||!pin||pin.length!==6||!phone){showToast('Fill all fields. PIN=6 digits.','error');return;}
  const userData={action:'saveUser',originalKey,username,name,phone,pin,role,store,status:'active'};
  showToast(lang==='zh'?'正在保存...':'Saving...','pending');
  try {
    await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(userData)});
    if(originalKey&&originalKey!==username) delete cachedUsers[originalKey];
    cachedUsers[username]={name,phone,pin,role,store,status:'active'};
    saveData('cached_users',cachedUsers);
    showToast(t('userSaved'),'success'); closeUserEditModal(); renderAdminTab();
  } catch(e){showToast('Error: '+e,'error');}
}
async function deleteUser(username) {
  if(!confirm('Delete user @'+username+'?')) return;
  try {
    await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deleteUser',username})});
    delete cachedUsers[username]; saveData('cached_users',cachedUsers);
    // Also wipe any device bindings for this user so the device is immediately free
    var b=loadData('_device_bindings',{});
    var changed=false;
    Object.keys(b).forEach(function(k){
      if(String(b[k]).toLowerCase()===String(username).toLowerCase()){delete b[k];changed=true;}
    });
    if(changed) saveData('_device_bindings',b);
    showToast(t('userDeleted'),'success'); renderAdminTab();
  } catch(e){showToast('Error: '+e,'error');}
}

async function changeCurrentUserPin() {
  const currentPin=document.getElementById('profile-curr-pin').value.trim();
  const newPin=document.getElementById('profile-new-pin').value.trim();
  const confirmPin=document.getElementById('profile-conf-pin').value.trim();
  if(!currentPin||!newPin||!confirmPin){showToast(lang==='zh'?'请填写完整！':'Fill all fields!','error');return;}
  if(String(currentPin)!==String(currentUser.pin)){showToast(lang==='zh'?'当前密码错误！':'Incorrect current PIN!','error');return;}
  if(newPin.length!==6||isNaN(newPin)){showToast(lang==='zh'?'新密码必须是6位数字！':'New PIN must be 6 digits!','error');return;}
  if(newPin!==confirmPin){showToast(lang==='zh'?'新密码不一致！':'New PINs do not match!','error');return;}
  showToast(lang==='zh'?'正在保存...':'Saving...','pending');
  const userPayload={action:'saveUser',originalKey:currentUser.username,username:currentUser.username,name:currentUser.name,phone:currentUser.phone||'',pin:newPin,role:currentUser.role,store:currentUser.store,status:'active'};
  try {
    await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(userPayload)});
    currentUser.pin=newPin;
    if(cachedUsers[currentUser.username]){cachedUsers[currentUser.username].pin=newPin;saveData('cached_users',cachedUsers);}
    showToast(lang==='zh'?'密码修改成功！':'PIN updated!','success');
    document.getElementById('profile-curr-pin').value='';
    document.getElementById('profile-new-pin').value='';
    document.getElementById('profile-conf-pin').value='';
  } catch(e){showToast('Failed: '+e,'error');}
}

function checkAllStoresSubmitted() {
  if(!currentUser||!['admin','boss','manager'].includes(currentUser.role)) return;
  const today=dateKeyUTC8();
  const notifiedKey='notified_all_submitted_'+today;
  if(sessionStorage.getItem(notifiedKey)) return;
  const todaySales=getSales().filter(s=>s.dateKey===today);
  const submittedStores=new Set(todaySales.map(s=>s.store));
  const allSubmitted=BRANCHES.length>0&&BRANCHES.every(b=>submittedStores.has(b));
  if(allSubmitted){
    document.getElementById('all-submitted-title').textContent=t('allSubmittedTitle');
    document.getElementById('all-submitted-msg').textContent=t('allSubmittedMsg');
    document.getElementById('awesome-btn').textContent=t('awesomeBtn');
    document.getElementById('all-submitted-modal').classList.add('open');
    sessionStorage.setItem(notifiedKey,'true');
  }
}

function sendReminder() {
  const today=dateKeyUTC8();
  const todaySales=getSales().filter(s=>s.dateKey===today);
  const submittedStores=new Set(todaySales.map(s=>s.store));
  const pending=BRANCHES.filter(b=>!submittedStores.has(b));
  if(pending.length===0){showToast(lang==='zh'?'所有门店今日已提交！':'All branches submitted today!','success');return;}
  const msgEn=`🔔 *Sales Report Reminder*\nDate: ${today}\n\nPending branches:\n${pending.map(p=>'- '+p).join('\n')}\n\nPlease submit ASAP. Thank you!`;
  const msgZh=`🔔 *销售报告提醒*\n日期: ${today}\n\n以下门店尚未提交：\n${pending.map(p=>'- '+p).join('\n')}\n\n请尽快通过系统提交。谢谢！`;
  let contactsHtml='';
  pending.forEach(storeName=>{
    const storeUsers=Object.entries(cachedUsers)
      .filter(([,u])=>u.store===storeName&&u.phone&&u.status==='active')
      .map(([,u])=>({name:u.name,phone:u.phone}));
    if(storeUsers.length>0){
      contactsHtml+=`
        <div style="margin-top:8px;font-size:13px;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;padding:8px 12px;border-radius:8px;border:1px solid var(--border)">
          <span style="font-weight:700">${storeName}:</span>
          <div style="display:flex;gap:6px;">
            ${storeUsers.map(u=>`
              <a href="https://wa.me/${u.phone}?text=${encodeURIComponent(lang==='zh'?'您好！请尽快提交您门店今天的日销数据，谢谢！':'Hi! Please submit today\'s sales figures ASAP, thank you!')}" target="_blank" class="badge" style="background:#d1fae5;color:#065f46;text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;">
                📱 ${u.name}
              </a>`).join('')}
          </div>
        </div>`;
    }
  });
  if(contactsHtml){
    const overlay=document.createElement('div');
    overlay.className='modal-overlay open'; overlay.id='reminder-modal';
    overlay.innerHTML=`
      <div class="modal-box">
        <div class="modal-title">🔔 Send Reminders</div>
        <p style="font-size:14px;color:var(--text2);margin-bottom:14px">${lang==='zh'?'未提交门店：':'Pending stores:'} <strong>${pending.join(', ')}</strong></p>
        <button class="btn warn" onclick="window.open('https://wa.me/?text=${encodeURIComponent(lang==='zh'?msgZh:msgEn)}','_blank');document.getElementById('reminder-modal').remove();" style="margin-bottom:14px">
          📢 ${lang==='zh'?'发送群组提醒':'Send Group Reminder'}
        </button>
        <div style="font-weight:800;font-size:13px;margin-bottom:6px;color:var(--text);border-top:1px solid var(--border);padding-top:10px">
          ${lang==='zh'?'直接联系负责人：':'Direct WhatsApp to staff:'}
        </div>
        ${contactsHtml}
        <button class="btn secondary" onclick="document.getElementById('reminder-modal').remove();" style="margin-top:16px">Close 关闭</button>
      </div>`;
    document.body.appendChild(overlay);
  } else {
    window.open('https://wa.me/?text='+encodeURIComponent(lang==='zh'?msgZh:msgEn),'_blank');
  }
}

function checkBdTotal(){
  var c=parseFloat(document.getElementById('bd-cash').value)||0,q=parseFloat(document.getElementById('bd-qr').value)||0;
  var k=parseFloat(document.getElementById('bd-card').value)||0,b=parseFloat(document.getElementById('bd-bank').value)||0;
  var sum=parseFloat((c+q+k+b).toFixed(2));var ok=sum===(window._bdTotal||0);
  var el=document.getElementById('bd-check');
  if(el){el.textContent=(lang==='en'?'Breakdown: RM':'Pecahan: RM')+sum.toFixed(2)+(ok?' ✅':(lang==='en'?' — must be RM':' — mesti RM')+(window._bdTotal||0).toFixed(2));el.style.background=ok?'#f0fdf4':'#fff1f2';el.style.color=ok?'#10b981':'#ef4444';}
}

async function ufDoUpload(ov){
  var fi=document.getElementById('uf-file');
  if(!fi||!fi.files||!fi.files[0]){showToast(lang==='en'?'Please select a receipt photo':'Sila pilih foto resit','error');return;}
  var btn=document.getElementById('uf-upload-btn');
  var EN3=lang==='en'; var ZH3=lang==='zh';
  var needsApproval=!!window._needsApproval;
  if(btn){btn.disabled=true;btn.textContent=ZH3?'上传中...':(EN3?'Uploading...':'Sedang muat naik...');}
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var b64=e.target.result.split(',')[1];
      var sd=window._pendingSubmit||{};
      var note=document.getElementById('uf-note');
      var noteVal=note?note.value:'';
      // Step 1: Upload receipt — server always saves the file; it only
      // auto-locks the day if this role has confirm_daily permission.
      // (Fire-and-forget via no-cors — same pattern used everywhere else
      // in this app since GAS doesn't support CORS preflight on POST.)
      await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',cache:'no-cache',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'uploadSettlement',store:sd.store,dateKey:sd.targetDate,
          fileData:b64,fileName:fi.files[0].name,note:noteVal,
          submitter:currentUser.name,uploadedBy:currentUser.name,role:currentUser.role})});
      ov.remove();
      // Save settlement record locally for the Settlement Reports viewer
      var settRec={id:String(Date.now()),store:sd.store,dateKey:sd.targetDate,
        total:sd.total,uploadedBy:currentUser.name,role:currentUser.role,
        datetime:nowUTC8(),note:noteVal,fileName:fi.files[0].name,fileUrl:'',
        status:needsApproval?'pending_approval':'confirmed'};
      var settArr=getSettlementsData();settArr.push(settRec);saveSettlementsData(settArr);
      if(needsApproval){
        // Create the pending approval request — uses the ACTUAL breakdown
        // amounts captured when the breakdown form was confirmed, not the
        // placeholder values on _pendingSubmit.
        var rec={id:String(Date.now()),type:'settlement',status:'pending',
          store:sd.store,dateKey:sd.targetDate,total:sd.total,
          cash:window._bdCash||0,qr:window._bdQr||0,card:window._bdCard||0,bank:window._bdBank||0,
          remark:noteVal,
          submitter:currentUser.username,name:currentUser.name,role:currentUser.role,
          datetime:nowUTC8(),month:sd.targetDate.slice(0,7)};
        var appr=getApprovals(); appr.push(rec); saveApprovals(appr);
        await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',cache:'no-cache',
          headers:{'Content-Type':'text/plain'},
          body:JSON.stringify(Object.assign({action:'submitApprovalRequest'},rec))}).catch(function(){});
        showToast(ZH3?'✅ 收据已上传 — 已提交主管/经理/管理员审批':
          (EN3?'✅ Receipt uploaded — submitted for Supervisor/Manager/Admin approval':
               '✅ Resit dimuat naik — dihantar untuk kelulusan'),'success');
        renderSubmitTab();
        if(currentTab==='records') renderRecordsTab();
      } else {
        // Save sales to GAS with breakdown already captured
        confirmSubmit(false);
        // Lock the day — settlement uploaded and confirmed
        confirmAndLockAfterUpload(sd.store,sd.targetDate);
        showToast('✅ Daily Sales Confirmed','success');
      }
    }catch(err){
      if(btn){btn.disabled=false;btn.textContent='📤 Upload & Confirm Daily Sales';}
      showToast('Upload failed, please try again','error');
    }
  };reader.readAsDataURL(fi.files[0]);
}

async function uploadSettlement() {
  const store   = window._settlementStore;
  const dateKey = window._settlementDateKey;
  const fileInput = document.getElementById('settlement-file');
  const note    = document.getElementById('settlement-note').value || '';

  if(!fileInput || !fileInput.files || !fileInput.files[0]) {
    showToast(lang==='zh'?'请先拍摄或选择图片':'Please select or take a photo first','error');
    return;
  }

  const file = fileInput.files[0];
  const btn  = document.getElementById('upload-submit-btn');
  const progressWrap = document.getElementById('upload-progress');
  const progressBar  = document.getElementById('upload-progress-bar');
  const progressLabel= document.getElementById('upload-progress-label');

  if(btn) { btn.disabled=true; btn.textContent = lang==='zh'?'上传中...':'Uploading...'; }
  if(progressWrap) progressWrap.style.display = 'block';

  // Animate progress bar
  let pct = 0;
  const ticker = setInterval(() => {
    pct = Math.min(pct + 6, 88);
    if(progressBar) progressBar.style.width = pct + '%';
  }, 200);

  try {
    // Read file as base64
    const b64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });

    const payload = {
      action:    'uploadSettlement',
      store,
      dateKey,
      submitter: currentUser.name,
      role:      currentUser.role,
      note,
      fileName:  file.name,
      mimeType:  file.type || 'image/jpeg',
      fileData:  b64
    };

    await fetch(WEB_APP_URL, {
      method:  'POST',
      mode:    'no-cors',
      cache:   'no-cache',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });

    clearInterval(ticker);
    if(progressBar)  progressBar.style.width = '100%';
    if(progressLabel) progressLabel.textContent = lang==='zh' ? '✅ 上传成功！' : '✅ Upload successful!';

    setTimeout(() => {
      closeSettlementModal();
      confirmAndLockAfterUpload(window._settlementStore, window._settlementDateKey);
    }, 900);

  } catch(e) {
    clearInterval(ticker);
    if(btn) { btn.disabled=false; btn.textContent='📤 Upload 上传'; }
    if(progressWrap) progressWrap.style.display = 'none';
    showToast('Upload failed: ' + e.message, 'error');
  }
}

        <input class="denom-qty" type="number" id="dqi-${d.val.toFixed(2).replace('.','_')}" min="0"
          value="${_cdQty[d.val]||0}" inputmode="numeric"
          onchange="cdQtySet(${d.val},this.value)">
        <button class="denom-btn plus"  onclick="cdQtyChange(${d.val},+1)">+</button>
      </div>
    </div>`).join('');

  const mvListHtml = (list, type) => list.length===0
    ? `<div style="color:var(--text2);font-size:13px;padding:6px 0">${lang==='zh'?'暂无记录':'No records yet'}</div>`
    : list.map(r=>`
      <div class="move-item">
        <div>
          <div style="font-size:13px;font-weight:700">${r.reason||'-'}</div>

        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="${type==='in'?'move-in':'move-out'}">${type==='in'?'+':'-'}RM ${parseFloat(r.amount||0).toFixed(2)}</span>
          <button onclick="deleteCashMovement('${r.id}')" style="background:#fee2e2;border:none;border-radius:8px;padding:3px 8px;font-size:11px;color:#ef4444;cursor:pointer;font-weight:700">✕</button>
        </div>
      </div>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'cd-main-modal';
  overlay.innerHTML = `
    <div class="cd-modal-box">

      <!-- HEADER -->
      <div class="cd-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:17px;font-weight:900">🗄️ ${lang==='zh'?'收银机管理':'Cash Drawer Manager'}</div>
            <div style="font-size:12px;opacity:.85;margin-top:2px">🏪 ${_cdStore} · 📅 ${_cdDate}</div>
          </div>
          <button onclick="document.getElementById('cd-main-modal').remove()"
            style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;font-weight:700">✕</button>
        </div>
        <!-- Running totals -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">
          <div style="background:rgba(255,255,255,.15);border-radius:10px;padding:8px;text-align:center">
            <div style="font-size:9px;font-weight:700;opacity:.8">${lang==='zh'?'柜内现金':'In Drawer'}</div>
            <div style="font-size:16px;font-weight:900" id="cd-live-total">RM ${cdCalcTotal().toFixed(2)}</div>
          </div>
          <div style="background:rgba(16,185,129,.3);border-radius:10px;padding:8px;text-align:center">
            <div style="font-size:9px;font-weight:700;opacity:.8">${lang==='zh'?'现金入':'Cash In'}</div>
            <div style="font-size:16px;font-weight:900">+${totalIn.toFixed(2)}</div>
          </div>
          <div style="background:rgba(239,68,68,.3);border-radius:10px;padding:8px;text-align:center">
            <div style="font-size:9px;font-weight:700;opacity:.8">${lang==='zh'?'现金出':'Cash Out'}</div>
            <div style="font-size:16px;font-weight:900">-${totalOut.toFixed(2)}</div>
          </div>
        </div>
      </div>

      <!-- BILLS SECTION -->
      <div class="cd-section">
        <div class="cd-section-title">💵 ${lang==='zh'?'纸币':'Bills / Banknotes'}</div>
        <div class="denom-grid">${billRows}</div>
      </div>

      <!-- COINS SECTION -->
      <div class="cd-section">
        <div class="cd-section-title">🪙 ${lang==='zh'?'硬币':'Coins'}</div>
        <div class="denom-grid">${coinRows}</div>
      </div>

      <!-- CASH IN SECTION -->
      <div class="cd-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="cd-section-title" style="margin-bottom:0">
            ✅ ${lang==='zh'?'现金入':'Cash IN'} <span style="font-weight:900;color:#10b981">+RM ${totalIn.toFixed(2)}</span>
          </div>
          <button onclick="openAddMovement('in')"
            style="background:#10b981;color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer">
            + ${lang==='zh'?'添加':'Add'}
          </button>
        </div>
        <div id="cd-in-list">${mvListHtml(ins,'in')}</div>
      </div>

      <!-- CASH OUT SECTION — manager/boss/admin only -->
      ${true ? `
      <div class="cd-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="cd-section-title" style="margin-bottom:0">
            🚫 ${lang==='zh'?'现金出':'Cash OUT'} <span style="font-weight:900;color:#ef4444">-RM ${totalOut.toFixed(2)}</span>
          </div>
          <button onclick="openAddMovement('out')"
            style="background:#ef4444;color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer">
            + ${lang==='zh'?'添加':'Add'}
          </button>
        </div>
        <div id="cd-out-list">${mvListHtml(outs,'out')}${pendingOuts.length?`<div style="margin-top:8px;font-size:12px;color:#92400e;background:#fef3c7;border-radius:10px;padding:8px;font-weight:700">${pendingOuts.length} cash out request(s) waiting approval.</div>`:''}</div>
      </div>` : `
      <div class="cd-section" style="background:#f8fafc">
        <div style="font-size:13px;color:var(--text2);font-weight:600;text-align:center;padding:6px">
          🔒 ${lang==='zh'?'现金出功能仅限经理/管理员':'Cash Out — Manager / Admin / Boss only'}
        </div>

      </div>`}

      <!-- NOTE + SUBMIT -->
      <div class="cd-section">
        <label class="field-label" style="color:#92400e">${lang==='zh'?'备注（选填）':'Note (optional)'}</label>

// ── Denomination helpers ───────────────────────────────────────
function cdCalcTotal() {
  return ALL_DENOMS.reduce((sum,d)=>sum+((_cdQty[d.val]||0)*d.val), 0);
}

function cdQtyChange(val, delta) {
  _cdQty[val] = Math.max(0, (_cdQty[val]||0) + delta);
  cdRefreshDenom(val);
}

function cdQtySet(val, raw) {
  _cdQty[val] = Math.max(0, parseInt(raw)||0);
  cdRefreshDenom(val);
}

function cdRefreshDenom(val) {
  const key = val < 1 ? parseFloat(val).toFixed(2).replace('.','_') : val;
  const qi = document.getElementById('dqi-'+key);
  const ts = document.getElementById('dts-'+key);
  const liveEl = document.getElementById('cd-live-total');
  if(qi) qi.value = _cdQty[val]||0;
  if(ts) ts.textContent = 'RM '+((_cdQty[val]||0)*parseFloat(val)).toFixed(2);
  if(liveEl) liveEl.textContent = 'RM '+cdCalcTotal().toFixed(2);
}

// ── Cash In / Out movement ────────────────────────────────────
function openAddMovement(type) {
  document.getElementById('cd-add-mv-modal')?.remove();
  const isOut = type==='out';
  const ov = document.createElement('div');
  ov.className='modal-overlay open'; ov.id='cd-add-mv-modal';
  ov.innerHTML=`
    <div class="modal-box">
      <div class="modal-title" style="color:${isOut?'#ef4444':'#10b981'}">
        ${isOut?(lang==='zh'?'➕ 现金出':'➕ Cash OUT'):(lang==='zh'?'➕ 现金入':'➕ Cash IN')}
      </div>
      <div class="input-wrap">
        <label class="field-label">${lang==='zh'?'金额':'Amount'} (RM)</label>
        <div class="amount-input-wrap">
          <span class="amount-prefix" style="color:${isOut?'#ef4444':'#10b981'}">RM</span>
          <input type="number" class="amount-input" id="mv-amount" placeholder="0.00"
            min="0" step="0.01" inputmode="decimal"
            style="border-color:${isOut?'#ef4444':'#10b981'};background:${isOut?'#fff1f2':'#f0fdf4'}">
        </div>
      </div>
      <div class="input-wrap">
        <label class="field-label">${lang==='zh'?'原因/备注':'Reason / Note'}</label>
        <input type="text" id="mv-reason"
          placeholder="${isOut?(lang==='zh'?'如：银行存款、零用金':'e.g. Banking, Petty cash'):(lang==='zh'?'如：补充找零':'e.g. Top up change')}"
          style="border-color:${isOut?'#ef4444':'#10b981'}">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn secondary" style="flex:1"
          onclick="document.getElementById('cd-add-mv-modal').remove()">
          ${lang==='zh'?'取消':'Cancel'}
        </button>
        <button class="btn" style="flex:2;background:${isOut?'#ef4444':'#10b981'}"
          onclick="saveCashMovementEntry('${type}')">
          ${lang==='zh'?'保存':'Save'}
        </button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

function saveCashMovementEntry(type) {
  const amount = parseFloat(document.getElementById('mv-amount')?.value)||0;
  const reason = document.getElementById('mv-reason')?.value||'';
  if(amount<=0) { showToast('Enter an amount','error'); return; }

  const restrictedOut = type==='out' && !isExecutiveRole(currentUser.role);
  const record = {
    id: String(Date.now()),
    dateKey: _cdDate, store: _cdStore,
    type, amount, reason,
    submitter: currentUser.name, role: currentUser.role,
    datetime: nowUTC8(),
    month: _cdDate.slice(0,7),
    status: restrictedOut ? 'pending' : 'approved'
  };

  if(restrictedOut){
    const reqs = getApprovals();
    reqs.push({id:record.id,type:'cash_out',status:'pending',dateKey:_cdDate,store:_cdStore,amount,reason,requester:currentUser.name,requesterRole:currentUser.role,requestedAt:nowUTC8(),payload:JSON.stringify(record)});
    saveApprovals(reqs);
  } else {
    const mvs = getCashMovements();
    mvs.push(record);
    saveCashMovements(mvs);
  }

  fetch(WEB_APP_URL, {
    method:'POST', mode:'no-cors', cache:'no-cache',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'submitCashMovement',...record})
  }).catch(e=>console.warn('Movement sync failed:',e));

  document.getElementById('cd-add-mv-modal')?.remove();
  showToast(restrictedOut ? 'Cash out sent for approval.' : 'Saved','success');
  renderCashDrawerModal();
}
function deleteCashMovement(id) {
  if(!confirm(lang==='zh'?'删除此记录？':'Delete this entry?')) return;
  const mvs = getCashMovements().filter(r=>r.id!==String(id));
  saveCashMovements(mvs);
  renderCashDrawerModal();
  if(currentTab==='records') renderRecordsTab();
}

// ── Submit full cash drawer count ─────────────────────────────
function submitCashDrawerFull() {
  const total = cdCalcTotal();
  const note  = document.getElementById('cd-final-note')?.value||'';
  const breakdown = {};
  ALL_DENOMS.forEach(d=>{ if(_cdQty[d.val]>0) breakdown[d.val]=_cdQty[d.val]; });

  const record = {
    id: Date.now(), store: _cdStore, dateKey: _cdDate,
    month: _cdDate.slice(0,7), amount: total, total, note,
    breakdown: JSON.stringify(breakdown),
    submitter: currentUser.name, role: currentUser.role,
    datetime: nowUTC8()
  };

  showToast(lang==='zh'?'正在保存...':'Saving...','pending');
  fetch(WEB_APP_URL, {
    method:'POST', mode:'no-cors', cache:'no-cache',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'submitCashDrawer',...record})
  }).then(()=>{
    let cd = getCashDrawer().filter(r=>!(r.dateKey===_cdDate&&r.store===_cdStore));
    cd.push(record);
    saveCashDrawer(cd);
    showToast(lang==='zh'?'现金盘点已保存 ✓':'Cash count saved ✓','success');
    document.getElementById('cd-main-modal')?.remove();
    renderSubmitTab();
    if(currentTab==='records') renderRecordsTab();
  }).catch(e=>showToast('Error: '+e,'error'));
}

// kept for backwards compat
function openCashDrawerConfirm() { openCashDrawerModal(); }
function confirmCashDrawer(store,dateKey,amount,note) { openCashDrawerModal(); }

// ── Device binding helpers ───────────────────────────────────────────────
function _getDeviceBound(id){
  var b=loadData('_device_bindings',{});
  var owner=b[String(id)]||null;
  if(!owner) return null;
  // AUTO-UNLOCK: if the bound user no longer exists in cachedUsers, release the device
  if(Object.keys(cachedUsers).length>0 && !cachedUsers[owner] && !cachedUsers[owner.toLowerCase()]){
    delete b[String(id)];
    saveData('_device_bindings',b);
    return null;
  }
  return owner;
}
function _bindDevice(id,username){
  // Always overwrite — allows clean re-bind after admin reset
  var b=loadData('_device_bindings',{});
  b[String(id)]=String(username).toLowerCase();
  saveData('_device_bindings',b);
}
async function adminClearDeviceBind(username){
  var EN=lang==='en';
  if(!confirm(EN
    ?'Reset device binding for @'+username+'?\nThey can check in/out from any device immediately after this.'
    :'Reset peranti untuk @'+username+'?\nMereka boleh daftar masuk dari mana-mana peranti selepas ini.')) return;
  // 1. Wipe ALL bindings for this username on THIS device (admin phone / browser)
  var b=loadData('_device_bindings',{});
  Object.keys(b).forEach(function(k){
    if(String(b[k]).toLowerCase()===String(username).toLowerCase()) delete b[k];
  });
  saveData('_device_bindings',b);
  // 2. Tell GAS: set deviceReset='pending' in Users sheet + delete UserDevices rows
  //    Staff phone will self-clear localStorage binding on next login
  showToast(EN?'Sending reset...':'Menghantar reset...','pending');
  try{
    await fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',cache:'no-cache',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'clearDeviceBinding',username:username,
        clearedBy:currentUser.name,clearedAt:nowUTC8()})});
    // 3. Force-refresh user cache so deviceReset:'pending' flag reaches the staff phone
    await fetchLiveUsers(true);
    showToast(
      (EN?'✅ Device unblocked for @':'✅ Peranti dilepaskan untuk @')+username
      +(EN?' — they can now check in/out from any device.'
          :' — boleh daftar masuk dari mana-mana peranti sekarang.'),
      'success');
  }catch(e){
    showToast((EN?'Network error, try again: ':'Ralat rangkaian: ')+e.message.slice(0,50),'error');
    return;
  }
  renderAdminTab();
}

// Delegated click: handles dynamically rendered buttons (avoids onclick quote issues)
document.addEventListener('click', function(e){
  var b1=e.target.closest('.att-reset-btn');
  if(b1){
    showAttResetModal(b1.dataset.username,b1.dataset.datekey,b1.dataset.id,b1.dataset.type||'',b1.dataset.time||'');
    return;
  }
  var b3=e.target.closest('.att-edit-btn');
  if(b3){
    showAttEditModal(b3.dataset.id,b3.dataset.username,b3.dataset.datekey,b3.dataset.type||'',b3.dataset.datetime||'');
    return;
  }
  var b2=e.target.closest('.req-variance-btn');
  if(b2){ _requestVarianceApproval(b2.dataset.store, b2.dataset.datekey, parseFloat(b2.dataset.variance||0)); return; }
});

window.addEventListener('DOMContentLoaded',()=>{ fetchLiveUsers(); updateBiometricButton(); });
</script>
